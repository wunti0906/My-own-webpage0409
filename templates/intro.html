<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自我介紹 - {{ person.name }}</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f8f9fa; margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .intro-card {
            background: white;
            max-width: 600px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
        }
        .intro-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }
        .content { padding: 30px; }
        h1 { color: #333; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 25px; font-size: 1.1em; }
        
        .info-table { width: 100%; text-align: left; border-collapse: collapse; margin-bottom: 30px; }
        .info-table td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        .label { font-weight: bold; color: #555; width: 30%; }
        
        .btn-back {
            display: inline-block;
            padding: 10px 25px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: 0.3s;
        }
        .btn-back:hover { background-color: #555; }
    </style>
</head>
<body>

    <div class="intro-card">
        <!-- 顯示 photo5.jpeg -->
        <img src="{{ url_for('static', filename='photo6.jpeg') }}" alt="個人照片">
        
        <div class="content">
            <h1>{{ person.name }}</h1>
            <p class="subtitle">{{ person.department }} | {{ person.class }}</p>
            
            <table class="info-table">
                <tr>
                    <td class="label">學號</td>
                    <td>{{ person.student_id }}</td>
                </tr>
                <tr>
                    <td class="label">電子郵件</td>
                    <td>{{ person.email }}</td>
                </tr>
                <tr>
                    <td class="label">核心技能</td>
                    <td>{{ '、'.join(person.skills) }}</td>
                </tr>
                <tr>
                    <td class="label">個人簡介</td>
                    <td>{{ person.bio }}</td>
                </tr>
            </table>

            <a href="/" class="btn-back">返回首頁</a>
        </div>
    </div>

</body>
</html>
